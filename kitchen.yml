---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true
  chef_license: accept-no-persist
  product_name: <%= ENV['CHEF_PRODUCT_NAME'] || 'chef' %>
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

verifier:
  name: inspec
  inspec_tests:
    - path: test/integration/default

suites:
  - name: default
    run_list:
      - recipe[test::default]
  - name: resources
    run_list:
      - recipe[test]
    verifier:
      inputs:
        domain: ns1.example.org
        host_string: "ns1.example.org has address 1.1.1.1"
  - name: chroot
    run_list:
      - recipe[test::chroot]
    verifier:
      inputs:
        chroot: true
  - name: views
    run_list:
      - recipe[test::views]
    verifier:
      inputs:
        views: true
  - name: logging
    run_list:
      - recipe[test::logging]
    verifier:
      inputs:
        logging: true
  - name: linked-zones
    run_list:
      - recipe[test::linked_zones]
    verifier:
      inputs:
        domain: ns1.example.net
        host_string: "ns1.example.net has address 1.1.1.1"
        linked: true
  - name: zone-options
    run_list:
      - recipe[test::zone_options]
    verifier:
      inputs:
        domain: ns1.example.org
        host_string: "ns1.example.org has address 1.1.1.1"
